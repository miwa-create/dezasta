<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第5回講義</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        .btn {
            background: orange;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
        }

        .color {
            color: red;
        }
    </style>
</head>

<body>
    <h1 class="heading">初めてのjQuery</h1>

    <button type="button" class="btn">ボタン</button>

    <script>
        $(function () {
            // $(".heading").hide(1000);

            $(".btn").on("click", function () {
                // $(".heading").fadeToggle();
                $(".heading").toggleClass("color");
            })
        });
    </script>
</body>

</html>
